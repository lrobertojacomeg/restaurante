<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Reservación de Mesas</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        padding:20px;
    }

    .container{
        max-width:1200px;
        margin:auto;
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    .leyenda{
        display:flex;
        justify-content:center;
        gap:20px;
        margin-bottom:30px;
    }

    .item-leyenda{
        display:flex;
        align-items:center;
        gap:8px;
    }

    .color{
        width:20px;
        height:20px;
        border-radius:50%;
    }

    .libre-color{
        background:#2ecc71;
    }

    .ocupada-color{
        background:#e74c3c;
    }

    .reservada-color{
        background:#f1c40f;
    }

    .salon{
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(120px,1fr));
        gap:20px;
    }

    .mesa{
        height:120px;
        border-radius:12px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        color:white;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
        box-shadow:0 3px 8px rgba(0,0,0,.2);
    }

    .mesa:hover{
        transform:scale(1.05);
    }

    .libre{
        background:#2ecc71;
    }

    .ocupada{
        background:#e74c3c;
    }

    .reservada{
        background:#f1c40f;
        color:#333;
    }

    .panel{
        background:white;
        padding:20px;
        border-radius:10px;
        margin-top:30px;
        box-shadow:0 2px 10px rgba(0,0,0,.1);
    }

    .panel h2{
        margin-bottom:15px;
    }

    select, button{
        width:100%;
        padding:12px;
        margin-top:10px;
        border-radius:6px;
        border:1px solid #ccc;
    }

    button{
        background:#3498db;
        color:white;
        border:none;
        cursor:pointer;
    }

    button:hover{
        background:#2980b9;
    }

    #mesaSeleccionada{
        font-weight:bold;
        color:#3498db;
    }
</style>
</head>
<body>

<div class="container">

    <h1> Sistema de Reservación de Mesas</h1>

    <div class="leyenda">
        <div class="item-leyenda">
            <div class="color libre-color"></div>
            Libre
        </div>

        <div class="item-leyenda">
            <div class="color reservada-color"></div>
            Reservada
        </div>

        <div class="item-leyenda">
            <div class="color ocupada-color"></div>
            Ocupada
        </div>
    </div>

    <div class="salon" id="salon">

        <div class="mesa libre" data-id="1">
            Mesa 1
            <small>Libre</small>
        </div>

        <div class="mesa ocupada" data-id="2">
            Mesa 2
            <small>Ocupada</small>
        </div>

        <div class="mesa reservada" data-id="3">
            Mesa 3
            <small>Reservada</small>
        </div>

        <div class="mesa libre" data-id="4">
            Mesa 4
            <small>Libre</small>
        </div>

        <div class="mesa libre" data-id="5">
            Mesa 5
            <small>Libre</small>
        </div>

        <div class="mesa ocupada" data-id="6">
            Mesa 6
            <small>Ocupada</small>
        </div>

        <div class="mesa reservada" data-id="7">
            Mesa 7
            <small>Reservada</small>
        </div>

        <div class="mesa libre" data-id="8">
            Mesa 8
            <small>Libre</small>
        </div>

    </div>

    <div class="panel">
        <h2>Administrar Estado</h2>

        <p>Mesa seleccionada:
            <span id="mesaSeleccionada">
                Ninguna
            </span>
        </p>

        <select id="estadoMesa">
            <option value="libre"> Libre</option>
            <option value="reservada"> Reservada</option>
            <option value="ocupada"> Ocupada</option>
        </select>

        <button onclick="actualizarEstado()">
            Actualizar Estado
        </button>
    </div>

</div>

<script>

let mesaActual = null;

const mesas = document.querySelectorAll('.mesa');

mesas.forEach(mesa => {

    mesa.addEventListener('click', () => {

        mesaActual = mesa;

        document.getElementById('mesaSeleccionada').textContent =
            "Mesa " + mesa.dataset.id;
    });

});

function actualizarEstado(){

    if(!mesaActual){
        alert("Seleccione una mesa");
        return;
    }

    const estado =
        document.getElementById('estadoMesa').value;

    mesaActual.classList.remove(
        'libre',
        'reservada',
        'ocupada'
    );

    mesaActual.classList.add(estado);

    let textoEstado = "";

    switch(estado){

        case "libre":
            textoEstado = "Libre";
            break;

        case "reservada":
            textoEstado = "Reservada";
            break;

        case "ocupada":
            textoEstado = "Ocupada";
            break;
    }

    mesaActual.innerHTML =
        `Mesa ${mesaActual.dataset.id}
        <small>${textoEstado}</small>`;
}

</script>

</body>
</html>
